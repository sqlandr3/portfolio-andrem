<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>André Masoni Fraile | Portfólio Backend</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');
        
        :root {
            --accent: #00ff9d;
            --bg-dark: #0a0a0a;
            --sidebar: #121212;
            --editor: #1a1a1a;
            --terminal: #0d0d0d;
            --java-red: #e06c75;
            --spring-green: #98c379;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #d4d4d4;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .font-mono { font-family: 'Fira Code', monospace; }
        
        /* Syntax Highlighting */
        .syntax-keyword { color: #c678dd; }
        .syntax-string { color: #98c379; }
        .syntax-function { color: #61afef; }
        .syntax-variable { color: #e06c75; }
        .syntax-comment { color: #7f848e; font-style: italic; }
        .syntax-type { color: #d19a66; }
        .syntax-constant { color: #56b6c2; }
        .syntax-default { color: #abb2bf; }
        
        .line-number {
            display: inline-block;
            width: 32px;
            text-align: right;
            margin-right: 16px;
            color: #4b5563;
            user-select: none;
        }

        .code-line {
            display: flex;
            align-items: flex-start;
            white-space: pre;
            min-width: fit-content;
        }

        .sidebar-item.active {
            background-color: rgba(255, 255, 255, 0.07);
            color: white;
            border-left: 2px solid var(--accent);
        }

        .tab.active {
            background-color: var(--editor);
            color: white;
            border-top: 1px solid var(--accent);
        }

        .tab:not(.active) {
            background-color: #121212;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; border: 2px solid transparent; background-clip: content-box; }
        ::-webkit-scrollbar-thumb:hover { background: #444; background-clip: content-box; }

        .terminal-transition {
            transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #terminal-section.minimized #terminal-body {
            display: none;
        }

        #terminal-section.minimized {
            height: 36px !important;
        }

        .terminal-toggle-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 157, 0.7); border-color: rgba(0, 255, 157, 0.3); }
            50% { box-shadow: 0 0 20px 5px rgba(0, 255, 157, 0.5); border-color: rgba(0, 255, 157, 0.8); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 157, 0.7); border-color: rgba(0, 255, 157, 0.3); }
        }
        .animate-pulse-glow {
            animation: pulse-glow 2s infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in-content {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .animate-slide-up {
            animation: slideUp 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="flex flex-col h-screen select-none">

    <!-- Top Bar (Window Controls) -->
    <div class="h-8 bg-[#1e1e1e] flex items-center justify-between px-4 border-b border-black/20 shrink-0 z-50">
        <div class="flex items-center gap-2">
            <div class="md:flex hidden gap-2">
                <div class="w-3 h-3 rounded-full bg-[#ff5f56]"></div>
                <div class="w-3 h-3 rounded-full bg-[#ffbd2e]"></div>
                <div class="w-3 h-3 rounded-full bg-[#27c93f]"></div>
            </div>
            <button onclick="toggleMobileMenu()" class="md:hidden flex p-1 hover:bg-white/10 rounded">
                <i data-lucide="menu" class="w-4 h-4 text-gray-400"></i>
            </button>
        </div>
        <div class="text-[10px] md:text-[11px] text-gray-400 font-medium truncate px-2">André Masoni Fraile - Portfólio Backend</div>
        <div class="w-8 md:w-12"></div>
    </div>

    <!-- Main Container -->
    <div class="flex flex-1 overflow-hidden relative">
        
        <!-- Mobile Overlay -->
        <div id="mobile-overlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-black/60 z-20 hidden md:hidden transition-opacity duration-300 opacity-0"></div>
        
        <!-- Activity Bar (Simplified) -->
        <div id="activity-bar" class="w-12 bg-[#1e1e1e] flex md:flex flex-col items-center py-4 gap-6 border-r border-black/20 shrink-0 z-40 absolute md:relative top-0 bottom-0 left-0 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
            <i data-lucide="files" id="activity-files-icon" onclick="toggleSidebar()" class="w-6 h-6 text-[#00ff9d] cursor-pointer transition-colors" title="Explorador"></i>
            <i data-lucide="mail" onclick="selectFile('contact')" class="w-6 h-6 text-gray-500 hover:text-gray-300 cursor-pointer" title="Contato"></i>
            <div class="mt-auto mb-2">
                <i data-lucide="settings" class="w-6 h-6 text-gray-500 hover:text-gray-300 cursor-pointer"></i>
            </div>
        </div>

        <!-- Sidebar (File Explorer) -->
        <div id="sidebar" class="w-52 md:w-60 bg-[#121212] flex flex-col border-r border-black/40 shrink-0 absolute md:relative top-0 bottom-0 left-0 md:left-0 z-30 transform -translate-x-full md:translate-x-0 transition-all duration-300 ease-in-out overflow-hidden shadow-2xl md:shadow-none">
            <div class="min-w-[208px] md:min-w-[240px] flex flex-col h-full md:ml-0">
                <div class="px-4 h-9 flex items-center justify-between text-[11px] font-bold text-gray-500 uppercase tracking-widest border-b border-white/5 md:border-none">
                    <span>Explorador</span>
                    <button onclick="toggleSidebar()" class="p-1 hover:bg-white/10 rounded transition-colors text-gray-500 hover:text-gray-300" title="Ocultar Explorador">
                        <i data-lucide="chevron-left" class="w-4 h-4"></i>
                    </button>
                </div>
            <div class="flex-1 overflow-y-auto">
                <!-- Project Root -->
                <div onclick="toggleFolder('project')" class="flex items-center gap-1 px-2 py-1 text-xs font-bold text-white bg-white/5 cursor-pointer hover:bg-white/10">
                    <i data-lucide="chevron-down" id="arrow-project" class="w-4 h-4 transition-transform"></i>
                    <span class="uppercase tracking-tighter">PORTFOLIO-BACKEND</span>
                </div>
                
                <div id="folder-project" class="mt-1">
                    <!-- Resources Folder -->
                    <div onclick="toggleFolder('resources')" class="flex items-center gap-1 px-4 py-1 text-xs font-bold text-gray-400 cursor-pointer hover:bg-white/5">
                        <i data-lucide="chevron-down" id="arrow-resources" class="w-4 h-4 transition-transform"></i>
                        <span>src/main/resources</span>
                    </div>
                    
                    <div id="file-list" class="mt-1">
                        <!-- Files injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

        <!-- Editor Area -->
        <div class="flex-1 flex flex-col bg-[#1a1a1a] overflow-hidden">
            
            <!-- Tabs -->
            <div class="h-9 bg-[#121212] flex overflow-x-auto no-scrollbar" id="tab-container">
                <!-- Tabs injected here -->
            </div>

            <!-- Breadcrumbs -->
            <div class="h-6 bg-[#1a1a1a] flex items-center px-4 text-[11px] text-gray-500 gap-2 border-b border-black/10 overflow-x-auto no-scrollbar whitespace-nowrap">
                <i data-lucide="folder" class="w-3 h-3"></i>
                <span>src</span>
                <i data-lucide="chevron-right" class="w-3 h-3"></i>
                <span>main</span>
                <i data-lucide="chevron-right" class="w-3 h-3"></i>
                <span id="breadcrumb-file" class="text-gray-300">README.md</span>
            </div>

            <!-- Editor Content -->
            <div class="flex-1 overflow-auto bg-[#1a1a1a] relative" id="editor-content">
                <!-- Content injected here -->
            </div>

            <!-- Terminal Area (Adjusted Size) -->
            <div id="terminal-section" class="h-48 md:h-64 bg-[#0d0d0d] border-t border-white/10 flex flex-col shrink-0 terminal-transition overflow-hidden">
                <div class="px-4 h-9 flex items-center justify-between border-b border-white/5 bg-[#121212]">
                    <div class="flex gap-4 md:gap-6 h-full" id="terminal-tabs">
                        <span onclick="setTerminalTab('terminal')" id="tab-terminal" class="text-[11px] font-bold text-white uppercase tracking-wider border-b-2 border-[#00ff9d] flex items-center cursor-pointer">
                            Terminal
                        </span>
                        <span onclick="setTerminalTab('console')" id="tab-console" class="text-[11px] text-gray-500 uppercase tracking-wider flex items-center cursor-pointer hover:text-gray-300">
                            <span class="hidden sm:inline">Console de Depuração</span>
                            <span class="sm:hidden">Console</span>
                        </span>
                        <span onclick="setTerminalTab('output')" id="tab-output" class="text-[11px] text-gray-500 uppercase tracking-wider flex items-center cursor-pointer hover:text-gray-300">
                            <span class="hidden sm:inline">Saída (Logs)</span>
                            <span class="sm:hidden">Saída</span>
                        </span>
                    </div>
                    <div class="flex items-center gap-3 text-gray-500">
                        <div onclick="toggleTerminal()" class="terminal-toggle-btn p-1 rounded cursor-pointer transition-all hover:text-white flex items-center gap-1">
                            <span id="terminal-status-text" class="text-[9px] uppercase font-bold mr-1">Ocultar</span>
                            <i data-lucide="chevron-down" id="terminal-toggle-icon" class="w-4 h-4 transition-transform duration-300"></i>
                        </div>
                    </div>
                </div>
                <div class="flex-1 p-4 font-mono text-[12px] text-gray-400 overflow-y-auto" id="terminal-body">
                    <!-- Terminal content injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="h-6 bg-[#00ff9d] flex items-center justify-between px-3 text-[11px] font-semibold text-black shrink-0">
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-1 hover:bg-black/10 px-1 cursor-pointer">
                <i data-lucide="git-branch" class="w-3.5 h-3.5"></i> <span class="hidden sm:inline">main*</span>
            </div>
            <div class="flex items-center gap-1 hover:bg-black/10 px-1 cursor-pointer">
                <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> 0
            </div>
            <div class="hidden sm:flex items-center gap-1 hover:bg-black/10 px-1 cursor-pointer">
                <i data-lucide="alert-circle" class="w-3.5 h-3.5"></i> 0
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="hidden sm:block hover:bg-black/10 px-1 cursor-pointer">Lin 1, Col 1</div>
            <div class="hover:bg-black/10 px-1 cursor-pointer">UTF-8</div>
            <div class="hidden xs:flex items-center gap-1 hover:bg-black/10 px-1 cursor-pointer">
                <i data-lucide="check-circle-2" class="w-3.5 h-3.5"></i> Prettier
            </div>
        </div>
    </div>

    <script>
        const FILES = [
            { id: 'readme', name: 'README.md', type: 'md', icon: 'file-text', color: 'text-blue-400' },
            { id: 'about', name: 'Perfil.java', type: 'java', icon: 'file-code', color: 'text-red-500' },
            { id: 'skills', name: 'Tecnologias.yaml', type: 'yaml', icon: 'file-text', color: 'text-green-400' },
            { id: 'experience', name: 'Experiencia.java', type: 'java', icon: 'file-code', color: 'text-red-500' },
            { id: 'projects', name: 'Projetos.json', type: 'json', icon: 'file-json', color: 'text-[#00ff9d]' },
            { id: 'contact', name: 'Contato.sh', type: 'sh', icon: 'terminal', color: 'text-gray-400' }
        ];

        let activeFile = 'readme';
        let openFiles = ['readme'];
        let sidebarExpanded = { project: true, resources: true };
        let activeTerminalTab = 'terminal';
        let terminalMinimized = false;

        function toggleTerminal() {
            terminalMinimized = !terminalMinimized;
            const section = document.getElementById('terminal-section');
            const icon = document.getElementById('terminal-toggle-icon');
            const statusText = document.getElementById('terminal-status-text');
            
            if (terminalMinimized) {
                section.classList.add('minimized');
                icon.style.transform = 'rotate(180deg)';
                statusText.innerText = 'Mostrar';
            } else {
                section.classList.remove('minimized');
                icon.style.transform = 'rotate(0deg)';
                statusText.innerText = 'Ocultar';
                // Trigger re-render of content to ensure it looks good
                setTerminalTab(activeTerminalTab);
            }
        }

        function toggleFolder(folder) {
            sidebarExpanded[folder] = !sidebarExpanded[folder];
            const arrow = document.getElementById(`arrow-${folder}`);
            const content = folder === 'project' ? document.getElementById('folder-project') : document.getElementById('file-list');
            
            if (sidebarExpanded[folder]) {
                arrow.style.transform = 'rotate(0deg)';
                content.classList.remove('hidden');
            } else {
                arrow.style.transform = 'rotate(-90deg)';
                content.classList.add('hidden');
            }
        }

        function renderFileList() {
            const container = document.getElementById('file-list');
            container.innerHTML = FILES.map(file => `
                <div onclick="selectFile('${file.id}')" class="sidebar-item ${activeFile === file.id ? 'active' : ''} flex items-center gap-2 px-4 md:px-8 py-1 text-xs text-gray-400 hover:bg-white/5 cursor-pointer transition-colors">
                    <i data-lucide="${file.icon}" class="w-4 h-4 ${file.color}"></i>
                    <span>${file.name}</span>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function renderTabs() {
            const container = document.getElementById('tab-container');
            container.innerHTML = openFiles.map(id => {
                const file = FILES.find(f => f.id === id);
                return `
                    <div onclick="selectFile('${id}')" class="tab ${activeFile === id ? 'active' : ''} flex items-center gap-2 px-3 h-full border-r border-black/20 text-xs text-gray-400 cursor-pointer min-w-[100px] md:min-w-[140px] transition-all group">
                        <i data-lucide="${file.icon}" class="w-4 h-4 ${file.color}"></i>
                        <span class="flex-1 truncate">${file.name}</span>
                        <i onclick="event.stopPropagation(); closeFile('${id}')" data-lucide="x" class="w-3.5 h-3.5 opacity-0 group-hover:opacity-100 hover:bg-white/10 rounded p-0.5"></i>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        function selectFile(id) {
            activeFile = id;
            if (!openFiles.includes(id)) openFiles.push(id);
            document.getElementById('breadcrumb-file').innerText = FILES.find(f => f.id === id).name;
            
            // Close mobile menu if open
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth < 768 && !sidebar.classList.contains('-translate-x-full')) {
                toggleMobileMenu();
            }

            renderFileList();
            renderTabs();
            renderContent();
        }

        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const activityBar = document.getElementById('activity-bar');
            const filesIcon = document.getElementById('activity-files-icon');
            const overlay = document.getElementById('mobile-overlay');
            
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                sidebar.classList.add('translate-x-12');
                activityBar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.add('opacity-100'), 10);
                filesIcon.classList.add('text-[#00ff9d]');
                filesIcon.classList.remove('text-gray-500');
            } else {
                sidebar.classList.add('-translate-x-full');
                sidebar.classList.remove('translate-x-12');
                activityBar.classList.add('-translate-x-full');
                overlay.classList.remove('opacity-100');
                setTimeout(() => overlay.classList.add('hidden'), 300);
                filesIcon.classList.remove('text-[#00ff9d]');
                filesIcon.classList.add('text-gray-500');
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const filesIcon = document.getElementById('activity-files-icon');
            
            if (window.innerWidth < 768) {
                toggleMobileMenu();
                return;
            }

            if (sidebar.classList.contains('md:w-0')) {
                sidebar.classList.remove('md:w-0', 'md:opacity-0', 'md:border-none');
                sidebar.classList.add('md:w-60', 'md:opacity-100');
                filesIcon.classList.add('text-[#00ff9d]');
                filesIcon.classList.remove('text-gray-500');
            } else {
                sidebar.classList.remove('md:w-60', 'md:opacity-100');
                sidebar.classList.add('md:w-0', 'md:opacity-0', 'md:border-none');
                filesIcon.classList.remove('text-[#00ff9d]');
                filesIcon.classList.add('text-gray-500');
            }
        }

        function closeFile(id) {
            if (openFiles.length === 1) return;
            openFiles = openFiles.filter(f => f !== id);
            if (activeFile === id) activeFile = openFiles[0];
            selectFile(activeFile);
        }

        function wrapCode(lines) {
            return `
                <div class="font-mono text-[12px] md:text-[13px] py-4 overflow-x-auto">
                    ${lines.map((line, i) => `
                        <div class="code-line hover:bg-white/5 px-4">
                            <span class="line-number">${i + 1}</span>
                            <span class="syntax-default">${line}</span>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderContent() {
            const container = document.getElementById('editor-content');
            let content = '';

            switch(activeFile) {
                case 'readme':
                    content = `
                        <div class="p-4 md:p-8 max-w-4xl mx-auto fade-in-content">
                            <!-- Hero Section -->
                            <div class="flex flex-col md:flex-row gap-6 md:gap-8 items-center mb-8 md:mb-12 border-b border-white/5 pb-8 md:pb-12">
                                <div class="relative group">
                                    <div class="absolute -inset-1 bg-gradient-to-r from-[#00ff9d] to-blue-500 rounded-full blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
                                    
                                    <!-- FOTO DE PERFIL -->
                                    <div class="relative w-24 h-24 md:w-32 md:h-32 rounded-full bg-[#1e1e1e] border-2 border-[#00ff9d]/30 flex items-center justify-center overflow-hidden animate-pulse-glow">
                                        <!-- INSTRUÇÃO: 
                                             1. Salve sua foto como 'perfil.jpg' na mesma pasta deste arquivo index.html
                                             2. Troque o src abaixo para 'perfil.jpg'
                                             3. Se preferir, use um link direto de imagem (ex: do Imgur ou GitHub) -->
                                        <img src="andremasoni.jpg" class="w-full h-full object-cover" alt="André Masoni">
                                    </div>

                                    <div class="absolute bottom-1 right-1 w-6 h-6 bg-[#00ff9d] rounded-full border-4 border-[#1a1a1a] flex items-center justify-center">
                                        <div class="w-2 h-2 bg-black rounded-full animate-pulse"></div>
                                    </div>
                                </div>
                                <div class="text-center md:text-left">
                                    <h1 class="text-2xl md:text-3xl font-bold text-white mb-2 tracking-tight">André Masoni Fraile</h1>
                                    <p class="text-[#00ff9d] font-mono text-sm mb-4">@sqlandr3 • Java Backend Developer</p>
                                    <div class="flex flex-wrap justify-center md:justify-start gap-2">
                                        <span class="px-2 py-1 bg-white/5 border border-white/10 rounded text-[10px] text-gray-400 uppercase tracking-wider">Spring Boot</span>
                                        <span class="px-2 py-1 bg-white/5 border border-white/10 rounded text-[10px] text-gray-400 uppercase tracking-wider">APIs REST</span>
                                        <span class="px-2 py-1 bg-white/5 border border-white/10 rounded text-[10px] text-gray-400 uppercase tracking-wider">JWT Security</span>
                                    </div>
                                </div>
                            </div>

                            <!-- Bento Grid Style Info -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-12">
                                <div class="p-5 bg-[#252525]/50 border border-white/5 rounded-xl hover:border-[#00ff9d]/30 transition-colors group">
                                    <div class="flex items-center gap-3 mb-3">
                                        <div class="p-2 bg-red-500/10 rounded-lg text-red-500">
                                            <i data-lucide="code-2" class="w-5 h-5"></i>
                                        </div>
                                        <h3 class="font-semibold text-white">Mais Do Que Código</h3>
                                    </div>
                                    <p class="text-sm text-gray-400 leading-relaxed">
                                        Focado em estruturar sistemas que <span class="text-white">escalam</span> e são <span class="text-white">seguros</span>. Não basta funcionar, cada decisão técnica deve ser defensável.
                                    </p>
                                </div>

                                <div class="p-5 bg-[#252525]/50 border border-white/5 rounded-xl hover:border-[#00ff9d]/30 transition-colors group">
                                    <div class="flex items-center gap-3 mb-3">
                                        <div class="p-2 bg-blue-500/10 rounded-lg text-blue-500">
                                            <i data-lucide="database" class="w-5 h-5"></i>
                                        </div>
                                        <h3 class="font-semibold text-white">Arquitetura em Camadas</h3>
                                    </div>
                                    <p class="text-sm text-gray-400 leading-relaxed">
                                        Ascensão em APIs REST com <span class="text-white">segurança JWT</span>, tratamento de erros centralizado e <span class="text-white">testes automatizados</span>.
                                    </p>
                                </div>
                            </div>

                            <!-- Quick Links / Navigation -->
                            <div class="space-y-3">
                                <h3 class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] mb-4">Explorar Documentação</h3>
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                    <button onclick="selectFile('about')" class="flex items-center justify-between p-3 bg-[#1e1e1e] border border-white/5 rounded-lg hover:bg-[#252525] transition-all group">
                                        <div class="flex items-center gap-3">
                                            <i data-lucide="file-code" class="w-4 h-4 text-red-500"></i>
                                            <span class="text-sm text-gray-300">Perfil.java</span>
                                        </div>
                                        <i data-lucide="arrow-right" class="w-3 h-3 text-gray-600 group-hover:text-[#00ff9d] group-hover:translate-x-1 transition-all"></i>
                                    </button>
                                    <button onclick="selectFile('skills')" class="flex items-center justify-between p-3 bg-[#1e1e1e] border border-white/5 rounded-lg hover:bg-[#252525] transition-all group">
                                        <div class="flex items-center gap-3">
                                            <i data-lucide="cpu" class="w-4 h-4 text-green-400"></i>
                                            <span class="text-sm text-gray-300">Tecnologias.yaml</span>
                                        </div>
                                        <i data-lucide="arrow-right" class="w-3 h-3 text-gray-600 group-hover:text-[#00ff9d] group-hover:translate-x-1 transition-all"></i>
                                    </button>

                    `;

                case 'about':
                    content = wrapCode([
                        `<span class="syntax-keyword">package</span> <span class="syntax-default">com.andre.perfil;</span>`,

                    content = wrapCode([

                        `<span class="syntax-keyword">echo</span> <span class="syntax-string">"Conectando com André Masoni..."</span>`,

            if (activeFile === 'readme') {
                container.innerHTML = content;

                container.innerHTML = `<div class="fade-in-content">${content}</div>`;

        }

        // Terminal Logic
        const terminalBody = document.getElementById('terminal-body');
        const bootLogs = [
            "&gt; andre-portfolio@1.0.0 start",
            "&gt; spring-boot:run",
            "",
            "  .   ____          _            __ _ _",

            "2026-03-19 15:36:16 INFO 1 --- [main] c.a.p.PortfolioApplication : Started PortfolioApplication in 2.84 seconds (JVM running for 3.2)",
            "&gt; Conexão estabelecida. Sistema pronto para navegação."
        ];

        function setTerminalTab(tab) {
            activeTerminalTab = tab;
            
            // Update Tab UI
            ['terminal', 'console', 'output'].forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if (t === tab) {
                    el.classList.add('text-white', 'border-b-2', 'border-[#00ff9d]');
                    el.classList.remove('text-gray-500');
                } else {
                    el.classList.remove('text-white', 'border-b-2', 'border-[#00ff9d]');
                    el.classList.add('text-gray-500');
                }
            });

            // Update Content
            if (tab === 'terminal') {
                terminalBody.innerHTML = bootLogs.map(log => `<div>${log}</div>`).join('');
            } else if (tab === 'console') {
                terminalBody.innerHTML = `
                    <div class="text-blue-400"># Console de Depuração Ativo</div>
                    <div>&gt; andreMasoni.getSkills()</div>
                    <div class="text-green-400">["Java", "Spring", "Docker", "AWS"]</div>
                    <div>&gt; andreMasoni.isAvailable()</div>
                    <div class="text-green-400">true</div>
                    <div class="flex items-center gap-2 mt-2">
                        <span class="text-[#00ff9d]">&gt;</span>
                        <span class="w-2 h-4 bg-gray-500 cursor-blink"></span>
                    </div>
                `;
            } else if (tab === 'output') {
                terminalBody.innerHTML = `
                    <div class="text-gray-500">[2026-03-19 15:40:35] Compilação concluída com sucesso.</div>
                    <div class="text-gray-500">[2026-03-19 15:40:36] Verificando integridade dos microserviços...</div>
                    <div class="text-green-500">[OK] Serviço de Autenticação</div>
                    <div class="text-green-500">[OK] Serviço de Pagamentos</div>
                    <div class="text-green-500">[OK] Gateway de API</div>
                    <div class="text-gray-500">[2026-03-19 15:40:37] Sistema em estado saudável.</div>
                `;
            }
            terminalBody.scrollTop = terminalBody.scrollHeight;
        }

        function initTerminal() {
            setTerminalTab('terminal');
            setInterval(() => {
                if (activeTerminalTab === 'terminal') {
                    const time = new Date().toISOString().replace('T', ' ').substring(0, 19);
                    const log = `<div>${time} INFO 1 --- [nio-8080-exec-1] o.s.web.servlet.DispatcherServlet : Completed 200 OK</div>`;
                    terminalBody.innerHTML += log;
                    terminalBody.scrollTop = terminalBody.scrollHeight;
                }
            }, 5000);
        }

        // Keyboard Shortcuts
        window.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
                e.preventDefault();
                toggleSidebar();
            }
        });

        // Initialize
        renderFileList();
        renderTabs();
        renderContent();
        initTerminal();
    </script>
