<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>André Masoni Fraile | Portfólio Backend</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='100%25' x2='100%25' y2='0%25'><stop offset='0%25' stop-color='%2300ff9d'/><stop offset='100%25' stop-color='%233b82f6'/></linearGradient></defs><rect width='100' height='100' rx='24' fill='%231e1e1e' stroke='%2300ff9d' stroke-width='4' stroke-opacity='0.5'/><text x='50' y='68' font-family='system-ui, sans-serif' font-size='46' font-weight='900' fill='url(%23g)' text-anchor='middle'>AM</text></svg>">
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');
        
        :root {
            --accent: #00ff9d;
            --bg-dark: #0a0a0a;
            --sidebar: #121212;
            --editor: #1a1a1a;
            --terminal: #0d0d0d;
            --syntax-keyword: #c678dd;
            --syntax-string: #98c379;
            --syntax-function: #61afef;
            --syntax-variable: #e06c75;
            --syntax-comment: #7f848e;
            --syntax-type: #d19a66;
            --syntax-constant: #56b6c2;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #d4d4d4;
            margin: 0;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .font-mono { font-family: 'Fira Code', monospace; }
        
        /* Syntax Highlighting */
        .syntax-keyword { color: var(--syntax-keyword); }
        .syntax-string { color: var(--syntax-string); }
        .syntax-function { color: var(--syntax-function); }
        .syntax-variable { color: var(--syntax-variable); }
        .syntax-comment { color: var(--syntax-comment); font-style: italic; }
        .syntax-type { color: var(--syntax-type); }
        .syntax-constant { color: var(--syntax-constant); }
        .syntax-default { color: #abb2bf; }

        /* Synchronized Pulse Animation */
        .status-pulse {
            animation: statusPulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.9); }
        }
        
        /* Breadcrumbs */
        .breadcrumbs {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 16px;
            background-color: var(--editor);
            font-size: 11px;
            color: #858585;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .breadcrumb-item:hover {
            color: #cccccc;
            cursor: pointer;
        }
        
        .line-number {
            display: inline-block;
            width: 32px;
            text-align: right;
            margin-right: 16px;
            color: #4b5563;
            user-select: none;
        }

        .code-line {
            display: flex;
            align-items: flex-start;
            white-space: pre;
            min-width: fit-content;
        }

        .sidebar-item.active {
            background-color: rgba(255, 255, 255, 0.07);
            color: white;
            border-left: 2px solid var(--accent);
        }

        .tab.active {
            background-color: var(--editor);
            color: white;
            border-top: 1px solid var(--accent);
            box-shadow: inset 0 10px 20px -10px rgba(0, 255, 157, 0.2);
        }

        .tab:not(.active) {
            background-color: #121212;
        }

        /* Bento & Glass Effects */
        .bento-card {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 1rem;
            border-radius: 1.5rem; /* rounded-3xl */
            position: relative;
            overflow: hidden;
        }

        .bento-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(0, 255, 157, 0.05),
                transparent
            );
            transition: 0.5s;
        }

        .bento-card:hover::before {
            left: 100%;
        }

        @media (min-width: 768px) {
            .bento-card {
                padding: 1.5rem;
            }
        }

        /* Pulsing effect for profile photo */
        .profile-pulse {
            position: relative;
        }
        .profile-pulse::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: linear-gradient(to right, #00ff9d, #3b82f6);
            opacity: 0.4;
            z-index: -1;
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.4; }
            50% { transform: scale(1.05); opacity: 0.2; }
            100% { transform: scale(0.95); opacity: 0.4; }
        }

        .bento-card:hover {
            border-color: rgba(0, 255, 157, 0.4);
            background: rgba(40, 40, 40, 0.85);
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 20px 40px -15px rgba(0, 255, 157, 0.2);
        }

        .glow-text {
            text-shadow: 0 0 20px rgba(0, 255, 157, 0.3);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; border: 2px solid transparent; background-clip: content-box; }
        ::-webkit-scrollbar-thumb:hover { background: #444; background-clip: content-box; }

        .terminal-transition {
            transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s ease;
        }

        #terminal-section {
            background: rgba(13, 13, 13, 0.8);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 -10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .terminal-header {
            background: rgba(25, 25, 25, 0.5);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        #terminal-section.minimized #terminal-body {
            display: none;
        }

        #terminal-section.minimized {
            height: 36px !important;
        }

        .terminal-tab {
            position: relative;
            transition: all 0.2s ease;
        }

        .terminal-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 1px;
            background-color: #00ff9d;
            box-shadow: 0 0 8px rgba(0, 255, 157, 0.5);
        }

        .terminal-toggle-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .terminal-prompt {
            color: #00ff9d;
            font-weight: bold;
            margin-right: 8px;
        }

        .terminal-cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background-color: #00ff9d;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
            box-shadow: 0 0 5px rgba(0, 255, 157, 0.5);
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .log-info { color: #00ff9d; }
        .log-warn { color: #ffbd2e; }
        .log-error { color: #ff5f56; }
        .log-timestamp { color: #666; }
        .log-class { color: #4a9eff; }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 157, 0.7); border-color: rgba(0, 255, 157, 0.3); }
            50% { box-shadow: 0 0 20px 5px rgba(0, 255, 157, 0.5); border-color: rgba(0, 255, 157, 0.8); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 157, 0.7); border-color: rgba(0, 255, 157, 0.3); }
        }
        .animate-pulse-glow {
            animation: pulse-glow 2s infinite;
        }

        @keyframes icon-pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 0px rgba(0, 255, 157, 0)); }
            50% { transform: scale(1.15); filter: drop-shadow(0 0 8px rgba(0, 255, 157, 0.6)); color: #00ff9d; }
            100% { transform: scale(1); filter: drop-shadow(0 0 0px rgba(0, 255, 157, 0)); }
        }
        .animate-icon-pulse {
            animation: icon-pulse 2s infinite ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in-content {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .animate-slide-up {
            animation: slideUp 0.4s ease-out forwards;
        }

        @keyframes loadingBar {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        .animate-loading-bar {
            animation: loadingBar 1s ease-out forwards;
        }

        @keyframes shine {
            0% { background-position: 0% center; }
            100% { background-position: -200% center; }
        }

        .name-hover-animation {
            color: white;
            display: inline-block;
            background: linear-gradient(90deg, #ffffff, #00ff9d, #ffffff, #00ff9d, #ffffff);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: white;
            cursor: pointer;
            transition: -webkit-text-fill-color 0.8s cubic-bezier(0.4, 0, 0.2, 1), 
                        color 0.8s cubic-bezier(0.4, 0, 0.2, 1), 
                        transform 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.5s ease;
        }

        .name-hover-animation:hover {
            -webkit-text-fill-color: transparent !important;
            animation: shine 2s linear infinite !important;
            transform: scale(1.02);
            opacity: 0.9;
        }

        .name-hover-animation:not(:hover) {
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- Initial Loader -->
    <div id="initial-loader" class="fixed inset-0 bg-[#0a0a0a] z-[100] flex flex-col items-center justify-center transition-opacity duration-500">

            Iniciando workspace...

    <!-- Main Container -->
    <div class="flex flex-1 overflow-hidden relative">

        <div id="mobile-overlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-black/60 z-20 hidden md:hidden transition-opacity duration-300 opacity-0"></div>

        <div id="activity-bar" class="w-12 bg-[#1e1e1e] flex md:flex flex-col items-center py-4 gap-2 border-r border-black/20 shrink-0 z-40 absolute md:relative top-0 bottom-0 left-0 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">

                <div id="indicator-about" class="absolute left-0 top-0 bottom-0 w-[2px] bg-transparent transition-all"></div>

            </div>
            <div class="relative w-full flex justify-center cursor-pointer group py-2.5" onclick="selectFile('skills')">

        <!-- Editor Area -->

    <script>
        const FILES = [

            "<span class='log-timestamp'>[2026-03-20 14:47:47]</span> <span class='log-info'>INFO</span> <span class='log-class'>c.a.p.PortfolioApplication</span> : Starting PortfolioApplication...",
            "<span class='log-timestamp'>[2026-03-20 14:47:48]</span> <span class='log-info'>INFO</span> <span class='log-class'>c.a.p.PortfolioApplication</span> : No active profile set, falling back to default profiles: default",
            "<span class='log-timestamp'>[2026-03-20 14:47:49]</span> <span class='log-info'>INFO</span> <span class='log-class'>o.s.b.w.embedded.tomcat.TomcatWebServer</span> : Tomcat initialized with port 8080 (http)",
            "<span class='log-timestamp'>[2026-03-20 14:47:50]</span> <span class='log-info'>INFO</span> <span class='log-class'>c.a.p.PortfolioApplication</span> : Started PortfolioApplication in 2.84 seconds",
            "<span class='text-white'>&gt; Conexão estabelecida. Sistema pronto para navegação.</span>"
        ];

        function setTerminalTab(tab) {
            activeTerminalTab = tab;
            
            // Update Tab UI
            ['terminal', 'console', 'output'].forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if (t === tab) {
                    el.classList.add('text-white', 'terminal-tab', 'active');
                    el.classList.remove('text-gray-500');
                } else {
                    el.classList.remove('text-white', 'terminal-tab', 'active');
                    el.classList.add('text-gray-500');
                }
            });

            // Update Content
            if (tab === 'terminal') {
                terminalBody.innerHTML = `
                    <div class="space-y-1">
                        ${bootLogs.map(log => `<div>${log}</div>`).join('')}
                        <div class="flex items-center mt-4 pt-2 border-t border-white/5">
                            <span class="terminal-prompt">andre@portfolio:~$</span>
                            <span class="text-gray-300">ls -la</span>
                            <span class="terminal-cursor ml-1"></span>
                        </div>
                    </div>
                `;
            } else if (tab === 'console') {
                terminalBody.innerHTML = `
                    <div class="space-y-2">
                        <div class="text-blue-400 font-bold flex items-center gap-2">
                            <i data-lucide="info" class="w-3 h-3"></i>
                            Console de Depuração Ativo (v1.0.4)
                        </div>
                        <div class="pl-4 border-l border-blue-500/20">
                            <div class="flex items-center gap-2">
                                <span class="text-gray-500">In:</span>
                                <span class="text-white">andreMasoni.getSkills()</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-gray-500">Out:</span>
                                <span class="text-[#00ff9d]">["Java", "Spring", "Docker", "AWS"]</span>
                            </div>
                        </div>
                        <div class="pl-4 border-l border-blue-500/20">
                            <div class="flex items-center gap-2">
                                <span class="text-gray-500">In:</span>
                                <span class="text-white">andreMasoni.isAvailable()</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-gray-500">Out:</span>
                                <span class="text-[#00ff9d]">true</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-2 mt-4">
                            <span class="text-[#00ff9d] font-bold">&gt;</span>
                            <span class="terminal-cursor"></span>
                        </div>
                    </div>
                `;
            } else if (tab === 'output') {
                terminalBody.innerHTML = `
                    <div class="space-y-1">
                        <div class="text-gray-500 flex items-center gap-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span>
                            [2026-03-20 14:40:35] Compilação concluída com sucesso.
                        </div>
                        <div class="text-gray-500 flex items-center gap-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span>
                            [2026-03-20 14:40:36] Verificando integridade dos microserviços...
                        </div>
                        <div class="text-green-500 flex items-center gap-2 pl-4">
                            <i data-lucide="check" class="w-3 h-3"></i>
                            Serviço de Autenticação
                        </div>
                        <div class="text-green-500 flex items-center gap-2 pl-4">
                            <i data-lucide="check" class="w-3 h-3"></i>
                            Serviço de Pagamentos
                        </div>
                        <div class="text-green-500 flex items-center gap-2 pl-4">
                            <i data-lucide="check" class="w-3 h-3"></i>
                            Gateway de API
                        </div>
                        <div class="text-gray-500 flex items-center gap-2 mt-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
                            [2026-03-20 14:40:37] Sistema em estado saudável.
                        </div>
                    </div>
                `;
            }
            lucide.createIcons();
            terminalBody.scrollTop = terminalBody.scrollHeight;
        }

        function initTerminal() {
            setTerminalTab('terminal');
            
            // Typing effect for initial logs
            terminalBody.innerHTML = '';
            let logIndex = 0;
            
            function typeLog() {
                if (logIndex < bootLogs.length) {
                    const div = document.createElement('div');
                    div.innerHTML = bootLogs[logIndex];
                    terminalBody.appendChild(div);
                    terminalBody.scrollTop = terminalBody.scrollHeight;
                    logIndex++;
                    setTimeout(typeLog, Math.random() * 100 + 20);
                }
            }
            
            typeLog();

            setInterval(() => {
                if (activeTerminalTab === 'terminal' && logIndex >= bootLogs.length) {
                    const time = new Date().toISOString().replace('T', ' ').substring(0, 19);
                    const log = `<div><span class='log-timestamp'>[${time}]</span> <span class='log-info'>INFO</span> <span class='log-class'>o.s.w.s.DispatcherServlet</span> : Completed 200 OK</div>`;
                    const prompt = terminalBody.querySelector('.terminal-prompt')?.parentElement;
                    if (prompt) {
                        const newLog = document.createElement('div');
                        newLog.innerHTML = log;
                        terminalBody.querySelector('.space-y-1').insertBefore(newLog, prompt);
                    } else {
                        terminalBody.innerHTML += log;
                    }
                    terminalBody.scrollTop = terminalBody.scrollHeight;
                }
            }, 5000);
        }

        // Keyboard Shortcuts
        window.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
                e.preventDefault();
                toggleSidebar();
            }
        });

        // Initialize
        renderFileList();
        renderTabs();
        renderContent();
        initTerminal();

        // Initial Loader Animation
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('initial-loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.remove(), 500);
                }
            }, 1200);
        });
    </script>
</body>
</html>
